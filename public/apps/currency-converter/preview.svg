<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" width="720" height="420" role="img"
     aria-label="Currency Converter on a Souqna storefront">
  <defs>
    <linearGradient id="ccp-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6efde"/>
      <stop offset="100%" stop-color="#ead7b1"/>
    </linearGradient>
    <linearGradient id="ccp-window" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffaee"/>
      <stop offset="100%" stop-color="#f1e9d7"/>
    </linearGradient>
    <linearGradient id="ccp-card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffdf6"/>
      <stop offset="100%" stop-color="#ece1c7"/>
    </linearGradient>
    <filter id="ccp-shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#1f1b16" flood-opacity="0.18"/>
    </filter>
  </defs>
  <rect x="0" y="0" width="720" height="420" fill="url(#ccp-bg)"/>
  <g filter="url(#ccp-shadow)">
    <rect x="40" y="36" width="640" height="348" rx="14" fill="url(#ccp-window)"
          stroke="#bfa97a" stroke-opacity="0.4" stroke-width="1"/>
    <rect x="40" y="36" width="640" height="36" rx="14" fill="#1f1b16"/>
    <rect x="40" y="58" width="640" height="14" fill="#1f1b16"/>
    <g fill="#a8893f">
      <circle cx="58" cy="54" r="4"/>
      <circle cx="74" cy="54" r="4" opacity="0.5"/>
      <circle cx="90" cy="54" r="4" opacity="0.3"/>
    </g>
    <text x="360" y="59" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="11" fill="#e8dcc4" letter-spacing="0.18em">SOUQNA � LIVE STORE</text>
  </g>

  <g font-family="Georgia, 'Times New Roman', serif">
    <text x="80" y="120" font-size="26" font-weight="500" fill="#1f1b16" letter-spacing="-0.01em">
      Atelier collection
    </text>
    <text x="80" y="142" font-family="ui-monospace, monospace" font-size="11"
          fill="#1f1b16" opacity="0.6" letter-spacing="0.16em">SS &#8226; 26 PIECES</text>
  </g>

  <g transform="translate(540 100)" filter="url(#ccp-shadow)">
    <rect x="0" y="0" width="120" height="34" rx="17" fill="#f1e9d7" stroke="#1f1b16" stroke-opacity="0.18"/>
    <text x="14" y="22" font-family="ui-monospace, monospace" font-size="13" fill="#1f1b16">$  USD</text>
    <path d="M 100 14 l 6 6 l 6 -6" fill="none" stroke="#1f1b16" stroke-width="1.5"
          stroke-linecap="round" stroke-linejoin="round" opacity="0.55"/>
  </g>
  <g transform="translate(540 142)" filter="url(#ccp-shadow)">
    <rect x="0" y="0" width="140" height="148" rx="14" fill="#f1e9d7" stroke="#1f1b16" stroke-opacity="0.18"/>
    <g font-family="ui-monospace, monospace" font-size="12" fill="#1f1b16">
      <rect x="6" y="6" width="128" height="28" rx="8" fill="#a8893f" fill-opacity="0.18"/>
      <text x="14" y="24">USD</text>
      <text x="100" y="24" text-anchor="end" opacity="0.55">0.2747</text>
      <text x="14" y="50">EUR</text>
      <text x="100" y="50" text-anchor="end" opacity="0.55">0.2554</text>
      <text x="14" y="74">GBP</text>
      <text x="100" y="74" text-anchor="end" opacity="0.55">0.2178</text>
      <text x="14" y="98">QAR</text>
      <text x="100" y="98" text-anchor="end" opacity="0.55">&#8212;</text>
      <text x="14" y="122">AED</text>
      <text x="100" y="122" text-anchor="end" opacity="0.55">1.009</text>
    </g>
  </g>

  <g transform="translate(80 175)">
    <rect x="0" y="0" width="200" height="180" rx="12" fill="url(#ccp-card)"
          stroke="#bfa97a" stroke-opacity="0.5"/>
    <rect x="14" y="14" width="172" height="106" rx="6" fill="#d8b766" fill-opacity="0.35"/>
    <text x="14" y="142" font-family="Georgia, serif" font-size="15" fill="#1f1b16">Saffron silk wrap</text>
    <text x="14" y="160" font-family="ui-monospace, monospace" font-size="13" fill="#a8893f"
          font-weight="500">$ 91.50</text>
    <text x="14" y="174" font-family="ui-monospace, monospace" font-size="10" fill="#1f1b16"
          opacity="0.55">QAR 333.00</text>
  </g>
  <g transform="translate(300 175)">
    <rect x="0" y="0" width="200" height="180" rx="12" fill="url(#ccp-card)"
          stroke="#bfa97a" stroke-opacity="0.5"/>
    <rect x="14" y="14" width="172" height="106" rx="6" fill="#a8893f" fill-opacity="0.35"/>
    <text x="14" y="142" font-family="Georgia, serif" font-size="15" fill="#1f1b16">Cardamom oud candle</text>
    <text x="14" y="160" font-family="ui-monospace, monospace" font-size="13" fill="#a8893f"
          font-weight="500">$ 32.45</text>
    <text x="14" y="174" font-family="ui-monospace, monospace" font-size="10" fill="#1f1b16"
          opacity="0.55">QAR 118.00</text>
  </g>
</svg>
