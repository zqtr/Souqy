<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" width="720" height="420" role="img"
     aria-label="GIF picker inside the Souqna builder">
  <defs>
    <linearGradient id="gpp-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f1b16"/>
      <stop offset="100%" stop-color="#2c241b"/>
    </linearGradient>
    <linearGradient id="gpp-tile1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a8893f"/>
      <stop offset="100%" stop-color="#5a4a32"/>
    </linearGradient>
    <linearGradient id="gpp-tile2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8b3a3a"/>
      <stop offset="100%" stop-color="#4a1f1f"/>
    </linearGradient>
    <linearGradient id="gpp-tile3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d8b766"/>
      <stop offset="100%" stop-color="#a8893f"/>
    </linearGradient>
    <linearGradient id="gpp-tile4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a2f24"/>
      <stop offset="100%" stop-color="#1f1b16"/>
    </linearGradient>
  </defs>
  <rect x="0" y="0" width="720" height="420" fill="url(#gpp-bg)"/>
  <g transform="translate(60 40)">
    <rect x="0" y="0" width="600" height="340" rx="16" fill="#28221b"
          stroke="#a8893f" stroke-opacity="0.4"/>
    <text x="20" y="34" font-family="ui-monospace, monospace" font-size="11"
          fill="#d8b766" letter-spacing="0.2em">SOUQNA &#8226; BUILDER &#8226; GIF PICKER</text>
    <rect x="20" y="48" width="560" height="36" rx="8" fill="#1f1b16"
          stroke="#a8893f" stroke-opacity="0.35"/>
    <text x="36" y="71" font-family="Inter, system-ui, sans-serif" font-size="13"
          fill="#e8dcc4" opacity="0.85">Search "celebration"&</text>
    <g font-family="Inter, system-ui, sans-serif" font-size="11" font-weight="600">
      <g transform="translate(20 100)">
        <rect width="135" height="120" rx="10" fill="url(#gpp-tile1)"/>
        <text x="10" y="110" fill="#fffaee" letter-spacing="0.2em">DABKE</text>
      </g>
      <g transform="translate(165 100)">
        <rect width="135" height="120" rx="10" fill="url(#gpp-tile2)"/>
        <text x="10" y="110" fill="#fffaee" letter-spacing="0.2em">FLOWERS</text>
      </g>
      <g transform="translate(310 100)">
        <rect width="135" height="120" rx="10" fill="url(#gpp-tile3)"/>
        <text x="10" y="110" fill="#1f1b16" letter-spacing="0.2em">MABKHARA</text>
      </g>
      <g transform="translate(455 100)">
        <rect width="125" height="120" rx="10" fill="url(#gpp-tile4)"
              stroke="#d8b766" stroke-width="1.5"/>
        <text x="10" y="110" fill="#fffaee" letter-spacing="0.2em">FIREWORKS</text>
      </g>
    </g>
    <g transform="translate(20 240)">
      <rect width="560" height="78" rx="10" fill="#1f1b16" stroke="#a8893f" stroke-opacity="0.25"/>
      <rect x="14" y="14" width="50" height="50" rx="6" fill="url(#gpp-tile3)"/>
      <text x="80" y="36" font-family="Inter, system-ui, sans-serif" font-size="13" fill="#e8dcc4">
        Mabkhara incense, slow loop
      </text>
      <text x="80" y="54" font-family="ui-monospace, monospace" font-size="11"
            fill="#d8b766" opacity="0.7" letter-spacing="0.06em">320 &#215; 240 &#8226; 1.2 MB</text>
      <rect x="450" y="22" width="96" height="34" rx="999" fill="#d8b766"/>
      <text x="498" y="44" text-anchor="middle" font-family="Inter, system-ui, sans-serif"
            font-size="13" font-weight="600" fill="#1f1b16">Drop in</text>
    </g>
  </g>
</svg>
